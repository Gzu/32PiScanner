# 32PiScanner NTP — SERVE-ONLY config for the containerized field-brain time source.
#
# Key property: this NEVER disciplines the host clock. There is only one kernel
# clock shared by the host and all containers, so we deliberately do not step or
# slew it — the container just *reads* the host clock and answers queries. That
# means no SYS_TIME capability is needed and the container touches zero host state.
#
# This is correct for the rig because absolute UTC is irrelevant: the 32 Pis only
# need to agree with THIS laptop, not with true time. They all follow this one
# source, so they stay mutually aligned regardless of the laptop's absolute offset.

# Who may query us (the rig subnet only).
allow 192.168.50.0/24

# Advertise ourselves as a valid stratum-10 source using the local clock.
local stratum 10

# Deliberately NO `pool`/`server` (we don't discipline), NO `makestep`, NO
# `rtcsync` — every one of those would try to write the shared kernel clock.
