# 32PiScanner DHCP — dnsmasq config for the containerized field-brain.
# The container runs with host networking, so dnsmasq sees the rig NIC directly
# and receives the Pis' DHCP broadcasts (a NAT bridge would NOT — see README).

port=0                              # DHCP only, no DNS (avoids clashing with a host resolver on :53)
interface=eth0                     # <-- SET THIS to your rig NIC (find it: ip -o link show)
bind-interfaces                    # only listen on that NIC, never leak DHCP onto Wi-Fi

dhcp-range=192.168.50.100,192.168.50.200,12h
dhcp-option=42,192.168.50.1        # option 42 = NTP server (this laptop; informational)

# Offline field rig: hand out NO gateway and NO DNS.
dhcp-option=3                      # empty = no router
dhcp-option=6                      # empty = no DNS server
