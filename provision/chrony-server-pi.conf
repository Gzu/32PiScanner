# /etc/chrony/chrony.conf for the OPTIONAL designated "NTP-server Pi".
# Use this only if your RC box (Windows + Meinberg NTP) is not available as
# the time source. Pick one Pi, install this config, leave the others on
# chrony-client.conf pointing at this Pi's IP.

# Upstream public servers (the server Pi needs internet to discipline itself).
# Replace with your own NTP pool if you have a preferred one.
pool pool.ntp.org iburst maxsources 4

# Serve time to the local LAN. Lock the subnet down to your rig's range.
allow 192.168.1.0/24

# If we lose internet, keep serving with our last-known drift rather than
# refusing to answer (good for indoor rigs that may be offline during a shoot).
local stratum 10

makestep 1.0 3
rtcsync
driftfile /var/lib/chrony/chrony.drift
