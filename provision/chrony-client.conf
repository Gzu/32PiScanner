# /etc/chrony/chrony.conf for a 32PiScanner capture Pi.
# Replace 192.0.2.10 with the LAN IP of your NTP source (RC box running
# Meinberg NTP, or whichever Pi you designate as the server).

# Single source on the LAN. iburst speeds initial sync; tight polling keeps
# offset low — appropriate for a wired LAN with one local server.
server 192.0.2.10 iburst minpoll 4 maxpoll 6

# Adjust the kernel clock smoothly (no step jumps) once we're within 1s,
# step it abruptly otherwise (e.g. fresh boot).
makestep 1.0 3

# Sync the RTC every hour (Pi has no battery-backed RTC; chrony writes the
# system clock to the kernel's drift file on shutdown).
rtcsync

# Bind only to LAN interface — we don't serve time, just consume it.
bindcmdaddress 127.0.0.1
bindcmdaddress ::1

# Drift compensation file.
driftfile /var/lib/chrony/chrony.drift

# Reject leap-second smearing from public servers (irrelevant here, but a
# safe default).
leapsectz right/UTC
